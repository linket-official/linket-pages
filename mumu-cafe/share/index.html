/* ══ LIFF 初始化 ══ */
async function initLiff() {
  const statusEl = document.getElementById('status');
  const shareBtn = document.getElementById('shareBtn');

  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isInClient()) {
      shareBtn.disabled = false;
      statusEl.textContent = '點擊按鈕即可分享名片';
    } else {
      statusEl.textContent = '請在 LINE 內開啟此頁面以使用分享功能';
    }
  } catch(e) {
    statusEl.textContent = 'LIFF 初始化失敗，請確認 LIFF ID 是否正確';
    console.error(e);
  }
}

/* ══ 分享 Flex Message ══ */
async function shareFlex() {
  const statusEl = document.getElementById('status');
  statusEl.textContent = '準備分享中...';

  // 先確認 shareTargetPicker 是否可用
  if (!liff.isApiAvailable('shareTargetPicker')) {
    statusEl.textContent = '請到 LINE Developers → LIFF 設定，開啟「Share target picker」';
    return;
  }

  try {
    const result = await liff.shareTargetPicker([FLEX_MESSAGE]);
    if (result && result.status === 'success') {
      statusEl.textContent = '名片組已分享';
    } else {
      statusEl.textContent = '已取消分享';
    }
  } catch(e) {
    if (e.code === 'CANCEL') {
      statusEl.textContent = '已取消分享';
    } else {
      // 顯示詳細錯誤幫助除錯
      statusEl.textContent = `錯誤：${e.code || ''} ${e.message || JSON.stringify(e)}`;
      console.error('[shareFlex error]', e);
    }
  }
}
