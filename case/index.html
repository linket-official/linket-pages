<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LINKet Case｜數位名片夾</title>
<meta name="description" content="收藏、管理你的 LINKet 數位名片">
<meta property="og:title" content="LINKet Case｜數位名片夾">
<meta property="og:description" content="掃描 QRcode 或貼入連結，收藏管理你的數位名片">
<meta property="og:image" content="https://linket.app/case/og-image.jpg">
<meta property="og:url" content="https://linket.app/case">
<meta property="og:type" content="website">
<link rel="icon" href="/home/favicon.png">
<link rel="manifest" href="/case/manifest.json">
<meta name="theme-color" content="#111111">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#2979ff;
  --accent2:#1a56db;
  --bg:#0e0e0e;
  --bg2:#1a1a1a;
  --bg3:#242424;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);
  --text:#f0f0f0;
  --text2:rgba(240,240,240,.55);
  --text3:rgba(240,240,240,.3);
  --card:#1e1e1e;
  --r:14px;
  --r-sm:8px;
  --topbar:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  padding-bottom:env(safe-area-inset-bottom);
}

/* ── Top Bar ── */
.topbar{
  position:sticky;top:0;z-index:100;
  height:var(--topbar);
  background:rgba(14,14,14,.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1rem;
}
.topbar-brand{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.0625rem;font-weight:600;
  letter-spacing:-.01em;color:var(--text);
  text-decoration:none;display:flex;align-items:center;gap:.5rem;
}
.topbar-brand .lin{color:var(--text);}
.topbar-brand .ket{color:var(--accent);}
.topbar-brand .case{color:var(--text2);font-weight:400;}
.topbar-count{
  font-size:.75rem;color:var(--text3);
  letter-spacing:.04em;
}
.topbar-add{
  width:36px;height:36px;border-radius:50%;
  background:var(--accent);border:none;
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .15s;
  flex-shrink:0;
}
.topbar-add:hover{background:var(--accent2);transform:scale(1.06);}
.topbar-add svg{width:18px;height:18px;}

/* ── Search & Filter ── */
.search-wrap{
  padding:.75rem 1rem .5rem;
  position:sticky;top:var(--topbar);z-index:90;
  background:rgba(14,14,14,.9);
  backdrop-filter:blur(12px);
}
.search-box{
  display:flex;align-items:center;gap:.6rem;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:.6rem .85rem;
  transition:border-color .15s;
}
.search-box:focus-within{border-color:var(--accent);}
.search-box svg{width:16px;height:16px;flex-shrink:0;color:var(--text3);}
.search-input{
  background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Noto Sans TC',sans-serif;
  font-size:.9375rem;width:100%;
}
.search-input::placeholder{color:var(--text3);}

.filter-scroll{
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  display:flex;gap:.45rem;
  padding:.6rem 1rem .4rem;
}
.filter-scroll::-webkit-scrollbar{display:none;}
.filter-pill{
  flex-shrink:0;
  padding:.32rem .85rem;
  border-radius:50px;
  border:1px solid var(--border2);
  background:transparent;
  color:var(--text2);
  font-size:.8125rem;font-family:'Noto Sans TC',sans-serif;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.filter-pill.active{
  background:var(--accent);border-color:var(--accent);
  color:#fff;
}
.filter-pill:hover:not(.active){border-color:var(--border2);color:var(--text);}

/* ── Main Grid ── */
.main{padding:.5rem 1rem 2rem;}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:.75rem;
}
@media(min-width:540px){.grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr);}}

/* ── Card ── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  cursor:pointer;
  transition:border-color .15s,transform .15s;
  position:relative;
}
.card:hover{border-color:var(--border2);transform:translateY(-2px);}
.card:active{transform:translateY(0);}

.card-img{
  width:100%;aspect-ratio:16/9;
  object-fit:cover;display:block;
  background:var(--bg3);
}
.card-img-placeholder{
  width:100%;aspect-ratio:16/9;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;
  font-size:1.5rem;font-weight:600;
  letter-spacing:-.02em;
  color:rgba(255,255,255,.2);
}

.card-body{padding:.75rem .8rem .8rem;}
.card-title{
  font-size:.875rem;font-weight:500;
  color:var(--text);line-height:1.4;
  margin-bottom:.25rem;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.card-desc{
  font-size:.75rem;color:var(--text2);
  line-height:1.5;margin-bottom:.55rem;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.card-tags{
  display:flex;gap:.3rem;flex-wrap:wrap;
  margin-bottom:.5rem;
}
.tag{
  font-size:.6875rem;padding:.15rem .45rem;
  border-radius:50px;background:rgba(41,121,255,.15);
  color:rgba(100,160,255,.9);border:1px solid rgba(41,121,255,.2);
  white-space:nowrap;
}
.card-meta{
  display:flex;align-items:center;justify-content:space-between;
  gap:.4rem;
}
.card-url{
  font-size:.6875rem;color:var(--text3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:70%;
}
.card-date{font-size:.6875rem;color:var(--text3);flex-shrink:0;}

.card-menu-btn{
  position:absolute;top:.6rem;right:.6rem;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.5);border:none;
  color:rgba(255,255,255,.6);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;
  backdrop-filter:blur(4px);
}
.card:hover .card-menu-btn{opacity:1;}
.card-menu-btn svg{width:14px;height:14px;}

/* ── Empty State ── */
.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:4rem 2rem;text-align:center;
  gap:1rem;
}
.empty-icon{
  width:64px;height:64px;
  border:2px solid var(--border2);border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);margin-bottom:.5rem;
}
.empty-icon svg{width:28px;height:28px;}
.empty-title{font-size:1.0625rem;font-weight:500;color:var(--text);}
.empty-sub{font-size:.875rem;color:var(--text2);line-height:1.6;max-width:260px;}
.empty-btn{
  margin-top:.5rem;
  padding:.7rem 1.6rem;border-radius:50px;
  background:var(--accent);border:none;color:#fff;
  font-family:'Noto Sans TC',sans-serif;
  font-size:.9375rem;cursor:pointer;
  transition:background .15s;
}
.empty-btn:hover{background:var(--accent2);}

/* ── Modal Overlay ── */
.overlay{
  display:none;
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);
  align-items:flex-end;justify-content:center;
}
@media(min-width:600px){.overlay{align-items:center;}}
.overlay.active{display:flex;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ── Add Modal ── */
.add-modal{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  padding:1.5rem 1.25rem 2rem;
  width:100%;max-width:480px;
  animation:slideUp .25s ease;
}
@media(min-width:600px){
  .add-modal{border-radius:20px;margin:1rem;}
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}

.modal-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.0625rem;font-weight:600;
  margin-bottom:1.25rem;
}
.modal-label{
  font-size:.8125rem;color:var(--text2);
  margin-bottom:.4rem;display:block;
}
.modal-input{
  width:100%;background:var(--bg3);
  border:1px solid var(--border2);border-radius:var(--r-sm);
  padding:.7rem .9rem;color:var(--text);
  font-family:'Noto Sans TC',sans-serif;font-size:.9375rem;
  outline:none;transition:border-color .15s;
  margin-bottom:1rem;
}
.modal-input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:.6rem;margin-top:.25rem;}
.btn-primary{
  flex:1;padding:.72rem;border-radius:var(--r-sm);
  background:var(--accent);border:none;color:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:.9375rem;
  cursor:pointer;transition:background .15s;font-weight:500;
}
.btn-primary:hover{background:var(--accent2);}
.btn-primary:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;}
.btn-ghost{
  padding:.72rem 1.2rem;border-radius:var(--r-sm);
  background:transparent;border:1px solid var(--border2);
  color:var(--text2);font-family:'Noto Sans TC',sans-serif;
  font-size:.9375rem;cursor:pointer;transition:border-color .15s;
}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}

.modal-or{
  text-align:center;color:var(--text3);
  font-size:.8125rem;margin:.75rem 0;
  position:relative;
}
.modal-or::before,.modal-or::after{
  content:'';position:absolute;top:50%;
  width:40%;height:1px;background:var(--border);
}
.modal-or::before{left:0;}
.modal-or::after{right:0;}

.scan-btn{
  width:100%;padding:.72rem;border-radius:var(--r-sm);
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);font-family:'Noto Sans TC',sans-serif;
  font-size:.9375rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  transition:border-color .15s;
}
.scan-btn:hover{border-color:var(--border2);background:var(--bg3);}
.scan-btn svg{width:18px;height:18px;flex-shrink:0;}

/* ── Camera Modal ── */
.camera-modal{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  padding:1.25rem 1.25rem 2rem;
  width:100%;max-width:480px;
  animation:slideUp .25s ease;
}
@media(min-width:600px){.camera-modal{border-radius:20px;margin:1rem;}}
#camera-video{
  width:100%;border-radius:var(--r-sm);
  background:#000;display:block;
  max-height:340px;object-fit:cover;
}
.camera-hint{
  text-align:center;color:var(--text2);
  font-size:.8125rem;margin:.75rem 0 1rem;
}
#scan-canvas{display:none;}

/* ── Detail Modal ── */
.detail-modal{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  padding:1.25rem 1.25rem 2rem;
  width:100%;max-width:480px;
  animation:slideUp .25s ease;
  max-height:90svh;overflow-y:auto;
}
@media(min-width:600px){.detail-modal{border-radius:20px;margin:1rem;}}
.detail-img{
  width:100%;aspect-ratio:16/9;
  object-fit:cover;border-radius:var(--r-sm);
  margin-bottom:1rem;background:var(--bg3);display:block;
}
.detail-img-placeholder{
  width:100%;aspect-ratio:16/9;
  border-radius:var(--r-sm);margin-bottom:1rem;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;
  font-size:2rem;font-weight:600;color:rgba(255,255,255,.15);
}
.detail-title{
  font-size:1.0625rem;font-weight:500;
  margin-bottom:.4rem;line-height:1.4;
}
.detail-desc{
  font-size:.875rem;color:var(--text2);
  line-height:1.6;margin-bottom:.85rem;
}
.detail-url{
  font-size:.8125rem;color:var(--accent);
  word-break:break-all;margin-bottom:1rem;
  text-decoration:none;display:block;
}
.detail-url:hover{text-decoration:underline;}
.detail-section-label{
  font-size:.75rem;color:var(--text3);
  letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:.5rem;margin-top:.85rem;
}
.tag-edit-wrap{
  display:flex;flex-wrap:wrap;gap:.35rem;
  margin-bottom:.25rem;
}
.tag-editable{
  display:flex;align-items:center;gap:.25rem;
  padding:.2rem .55rem .2rem .6rem;
  border-radius:50px;background:rgba(41,121,255,.15);
  border:1px solid rgba(41,121,255,.2);
  font-size:.75rem;color:rgba(100,160,255,.9);
}
.tag-del{
  background:transparent;border:none;cursor:pointer;
  color:rgba(100,160,255,.6);padding:0;line-height:1;
  font-size:.85rem;
}
.tag-add-input{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:50px;padding:.22rem .7rem;
  color:var(--text);font-family:'Noto Sans TC',sans-serif;
  font-size:.8125rem;outline:none;width:100px;
  transition:border-color .15s;
}
.tag-add-input:focus{border-color:var(--accent);}
.note-input{
  width:100%;background:var(--bg3);
  border:1px solid var(--border2);border-radius:var(--r-sm);
  padding:.65rem .85rem;color:var(--text);
  font-family:'Noto Sans TC',sans-serif;font-size:.875rem;
  outline:none;resize:none;min-height:80px;
  transition:border-color .15s;line-height:1.6;
}
.note-input:focus{border-color:var(--accent);}
.detail-actions{
  display:flex;gap:.6rem;margin-top:1.25rem;
}
.btn-open{
  flex:1;padding:.68rem;border-radius:var(--r-sm);
  background:var(--accent);border:none;color:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:.875rem;
  cursor:pointer;transition:background .15s;
  display:flex;align-items:center;justify-content:center;gap:.4rem;
}
.btn-open:hover{background:var(--accent2);}
.btn-open svg{width:15px;height:15px;}
.btn-danger{
  padding:.68rem 1rem;border-radius:var(--r-sm);
  background:transparent;border:1px solid rgba(220,53,69,.35);
  color:rgba(220,53,69,.75);font-family:'Noto Sans TC',sans-serif;
  font-size:.875rem;cursor:pointer;transition:all .15s;
}
.btn-danger:hover{background:rgba(220,53,69,.1);border-color:rgba(220,53,69,.6);}

/* ── Toast ── */
.toast{
  position:fixed;bottom:calc(1.5rem + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:50px;padding:.55rem 1.25rem;
  font-size:.875rem;color:var(--text);
  white-space:nowrap;z-index:500;
  animation:toastIn .2s ease;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ── Loading Skeleton ── */
.skeleton{
  border-radius:var(--r);overflow:hidden;
  background:var(--card);border:1px solid var(--border);
}
.skeleton-img{
  width:100%;aspect-ratio:16/9;
  background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
}
.skeleton-body{padding:.75rem .8rem .8rem;}
.skeleton-line{
  height:12px;border-radius:4px;margin-bottom:.5rem;
  background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
}
.skeleton-line.short{width:60%;}
.skeleton-line.shorter{width:40%;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
</style>
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
  <a class="topbar-brand" href="/home">
    <span class="lin">LIN</span><span class="ket">Ket</span>&nbsp;<span class="case">Case</span>
  </a>
  <span class="topbar-count" id="cardCount"></span>
  <button class="topbar-add" onclick="openAddModal()" aria-label="新增名片">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</header>

<!-- Search -->
<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" type="text"
           placeholder="搜尋品牌名稱、標籤、備註..."
           oninput="renderCards()">
  </div>
  <div class="filter-scroll" id="filterScroll"></div>
</div>

<!-- Main Grid -->
<main class="main">
  <div class="grid" id="grid"></div>
</main>

<!-- ── 新增名片 Modal ── -->
<div class="overlay" id="addOverlay" onclick="closeOnBg(event,'addOverlay')">
  <div class="add-modal">
    <div class="modal-title">新增名片</div>
    <label class="modal-label">貼入 LINKet 連結</label>
    <input class="modal-input" id="urlInput" type="url"
           placeholder="https://linket.app/..."
           onkeydown="if(event.key==='Enter')addByUrl()">
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal('addOverlay')">取消</button>
      <button class="btn-primary" id="addUrlBtn" onclick="addByUrl()">加入名片夾</button>
    </div>
    <div class="modal-or">或</div>
    <button class="scan-btn" onclick="openCamera()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="2" y="2" width="7" height="7" rx="1.5"/>
        <rect x="15" y="2" width="7" height="7" rx="1.5"/>
        <rect x="2" y="15" width="7" height="7" rx="1.5"/>
        <line x1="15" y1="15" x2="22" y2="15"/><line x1="22" y1="15" x2="22" y2="22"/>
        <line x1="15" y1="22" x2="22" y2="22"/><line x1="15" y1="15" x2="15" y2="22"/>
      </svg>
      掃描 QRcode
    </button>
  </div>
</div>

<!-- ── 相機掃描 Modal ── -->
<div class="overlay" id="cameraOverlay">
  <div class="camera-modal">
    <div class="modal-title" style="margin-bottom:.85rem;">掃描 QRcode</div>
    <video id="camera-video" playsinline autoplay muted></video>
    <canvas id="scan-canvas"></canvas>
    <div class="camera-hint">將 QRcode 對準鏡頭</div>
    <button class="btn-ghost" style="width:100%;" onclick="stopCamera()">取消</button>
  </div>
</div>

<!-- ── 名片詳情 Modal ── -->
<div class="overlay" id="detailOverlay" onclick="closeOnBg(event,'detailOverlay')">
  <div class="detail-modal" id="detailModal"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
const STORAGE_KEY = 'linket_case_v1';
let activeFilter = '全部';
let cameraStream = null;
let scanInterval = null;
let currentDetailId = null;

/* ── Storage ── */
function getCards(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }
  catch(e){ return []; }
}
function saveCards(cards){ localStorage.setItem(STORAGE_KEY,JSON.stringify(cards)); }

function addCard(card){
  const cards = getCards();
  if(cards.find(c=>c.url===card.url)) return {ok:false,reason:'dup'};
  cards.unshift(card);
  saveCards(cards);
  return {ok:true};
}
function deleteCard(id){
  saveCards(getCards().filter(c=>c.id!==id));
}
function updateCard(id,updates){
  saveCards(getCards().map(c=>c.id===id?{...c,...updates}:c));
}

/* ── Fetch OG info ── */
async function fetchCardInfo(rawUrl){
  let url = rawUrl.trim();
  if(!/^https?:\/\//i.test(url)) url = 'https://'+url;

  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const res = await fetch(proxy,{signal:AbortSignal.timeout(10000)});
  if(!res.ok) throw new Error('fetch failed');
  const data = await res.json();
  const html = data.contents||'';

  const parser = new DOMParser();
  const doc = parser.parseFromString(html,'text/html');

  const og = (prop)=>{
    const el = doc.querySelector(`meta[property="${prop}"],meta[name="${prop}"]`);
    return el?el.getAttribute('content'):'';
  };

  return {
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    url,
    title: og('og:title')||doc.title||url,
    description: og('og:description')||'',
    image: og('og:image')||'',
    addedAt: new Date().toISOString(),
    tags:[],
    note:''
  };
}

/* ── Add by URL ── */
async function addByUrl(){
  const input = document.getElementById('urlInput');
  const btn = document.getElementById('addUrlBtn');
  const url = input.value.trim();
  if(!url) return;

  btn.disabled=true; btn.textContent='擷取中...';

  try{
    const card = await fetchCardInfo(url);
    const result = addCard(card);
    if(result.ok){
      closeModal('addOverlay');
      input.value='';
      renderCards();
      updateCount();
      showToast('已加入名片夾');
    } else {
      showToast('此名片已存在');
    }
  } catch(e){
    showToast('無法擷取頁面，請確認連結');
  } finally {
    btn.disabled=false; btn.textContent='加入名片夾';
  }
}

/* ── Camera QR Scan ── */
async function openCamera(){
  closeModal('addOverlay');

  // 先取得相機權限，成功後才顯示 modal
  // 避免系統「允許相機」對話框關閉時誤觸 overlay click
  try{
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
    });
  } catch(e){
    showToast('無法開啟相機，請允許相機權限');
    return;
  }

  // 取得成功後再顯示 modal
  document.getElementById('cameraOverlay').classList.add('active');

  const video = document.getElementById('camera-video');
  video.srcObject = cameraStream;

  try{
    await new Promise((resolve, reject)=>{
      video.onplaying = resolve;
      video.onerror  = reject;
      video.play().catch(reject);
      setTimeout(resolve, 3000);
    });
    startScan();
  } catch(e){
    stopCamera();
    showToast('相機啟動失敗，請重試');
  }
}

function startScan(){
  if(typeof jsQR === 'undefined'){
    stopCamera();
    showToast('掃描模組載入失敗，請改用貼入連結');
    return;
  }
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('scan-canvas');
  const ctx = canvas.getContext('2d');
  let scanning = true;
  let lastScan = 0;
  function tick(now){
    if(!scanning) return;
    scanInterval = requestAnimationFrame(tick);
    if(now - lastScan < 250) return;
    lastScan = now;
    if(!video.videoWidth || !video.videoHeight) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    try{ ctx.drawImage(video, 0, 0, canvas.width, canvas.height); }
    catch(e){ return; }
    let imageData;
    try{ imageData = ctx.getImageData(0, 0, canvas.width, canvas.height); }
    catch(e){ return; }
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: 'dontInvert'
    });
    if(code && code.data){
      scanning = false;
      cancelAnimationFrame(scanInterval);
      stopCamera();
      handleScannedUrl(code.data);
    }
  }
  scanInterval = requestAnimationFrame(tick);
}

function stopCamera(){
  cancelAnimationFrame(scanInterval);
  clearInterval(scanInterval);
  if(cameraStream){
    cameraStream.getTracks().forEach(t=>t.stop());
    cameraStream=null;
  }
  closeModal('cameraOverlay');
}

async function handleScannedUrl(url){
  showToast('掃描成功，擷取中...');
  try{
    const card = await fetchCardInfo(url);
    const result = addCard(card);
    if(result.ok){
      renderCards(); updateCount();
      showToast('已加入名片夾');
    } else {
      showToast('此名片已存在');
    }
  } catch(e){
    showToast('無法擷取頁面資訊');
  }
}

/* ── Render ── */
function getFilteredCards(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let cards = getCards();
  if(activeFilter!=='全部'){
    cards = cards.filter(c=>c.tags.includes(activeFilter));
  }
  if(q){
    cards = cards.filter(c=>
      c.title.toLowerCase().includes(q)||
      c.description.toLowerCase().includes(q)||
      c.tags.some(t=>t.toLowerCase().includes(q))||
      (c.note||'').toLowerCase().includes(q)||
      c.url.toLowerCase().includes(q)
    );
  }
  return cards;
}

function getAllTags(){
  const all = getCards().flatMap(c=>c.tags);
  return [...new Set(all)].sort();
}

function renderFilters(){
  const tags = getAllTags();
  const scroll = document.getElementById('filterScroll');
  const filters = ['全部',...tags];
  scroll.innerHTML = filters.map(t=>`
    <button class="filter-pill${t===activeFilter?' active':''}"
      onclick="setFilter('${t}')">${t}</button>
  `).join('');
}

function setFilter(tag){
  activeFilter = tag;
  renderFilters();
  renderCards();
}

function renderCards(){
  const grid = document.getElementById('grid');
  const cards = getFilteredCards();
  renderFilters();

  if(cards.length===0){
    const allCards = getCards();
    if(allCards.length===0){
      grid.innerHTML=`
        <div class="empty" style="grid-column:1/-1">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <path d="M8 21h8M12 17v4"/>
            </svg>
          </div>
          <div class="empty-title">名片夾是空的</div>
          <div class="empty-sub">掃描 QRcode 或貼入連結，開始收藏你的數位名片</div>
          <button class="empty-btn" onclick="openAddModal()">+ 新增第一張名片</button>
        </div>`;
    } else {
      grid.innerHTML=`
        <div class="empty" style="grid-column:1/-1">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>
          <div class="empty-title">找不到結果</div>
          <div class="empty-sub">試試其他關鍵字或標籤</div>
        </div>`;
    }
    return;
  }

  grid.innerHTML = cards.map(c=>{
    const domainMatch = c.url.match(/linket\.app\/([^/?#]+)/);
    const shortUrl = domainMatch ? 'linket.app/'+domainMatch[1] : c.url.replace(/^https?:\/\//,'').split('/')[0];
    const initials = (c.title||'?').slice(0,2);
    const dateStr = new Date(c.addedAt).toLocaleDateString('zh-TW',{month:'short',day:'numeric'});
    const imgHtml = c.image
      ? `<img class="card-img" src="${escHtml(c.image)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`+
        `<div class="card-img-placeholder" style="display:none">${escHtml(initials)}</div>`
      : `<div class="card-img-placeholder">${escHtml(initials)}</div>`;
    const tagsHtml = c.tags.length
      ? `<div class="card-tags">${c.tags.map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>`
      : '';
    return `
      <div class="card" onclick="openDetail('${c.id}')">
        ${imgHtml}
        <div class="card-body">
          <div class="card-title">${escHtml(c.title)}</div>
          ${c.description?`<div class="card-desc">${escHtml(c.description)}</div>`:''}
          ${tagsHtml}
          <div class="card-meta">
            <span class="card-url">${escHtml(shortUrl)}</span>
            <span class="card-date">${dateStr}</span>
          </div>
        </div>
        <button class="card-menu-btn" onclick="event.stopPropagation();openDetail('${c.id}')" aria-label="詳情">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="5" r="1.2" fill="currentColor"/>
            <circle cx="12" cy="12" r="1.2" fill="currentColor"/>
            <circle cx="12" cy="19" r="1.2" fill="currentColor"/>
          </svg>
        </button>
      </div>`;
  }).join('');
}

function updateCount(){
  const n = getCards().length;
  document.getElementById('cardCount').textContent = n ? n+'  張名片' : '';
}

/* ── Detail Modal ── */
function openDetail(id){
  const card = getCards().find(c=>c.id===id);
  if(!card) return;
  currentDetailId = id;

  const initials = (card.title||'?').slice(0,2);
  const imgHtml = card.image
    ? `<img class="detail-img" src="${escHtml(card.image)}" alt="" loading="lazy">`
    : `<div class="detail-img-placeholder">${escHtml(initials)}</div>`;

  const tagsHtml = [
    ...card.tags.map((t,i)=>`
      <span class="tag-editable">
        ${escHtml(t)}
        <button class="tag-del" onclick="removeTag(${i})" aria-label="移除標籤">×</button>
      </span>`),
    `<input class="tag-add-input" id="tagInput" placeholder="+ 標籤"
      onkeydown="if(event.key==='Enter'||event.key===','){event.preventDefault();addTag();}"
      maxlength="12">`
  ].join('');

  document.getElementById('detailModal').innerHTML=`
    ${imgHtml}
    <div class="detail-title">${escHtml(card.title)}</div>
    ${card.description?`<div class="detail-desc">${escHtml(card.description)}</div>`:''}
    <a class="detail-url" href="${escHtml(card.url)}" target="_blank" rel="noopener">${escHtml(card.url)}</a>

    <div class="detail-section-label">標籤</div>
    <div class="tag-edit-wrap" id="tagWrap">${tagsHtml}</div>

    <div class="detail-section-label">備註</div>
    <textarea class="note-input" id="noteInput"
      placeholder="認識場合、備忘事項..."
      onblur="saveNote()">${escHtml(card.note||'')}</textarea>

    <div class="detail-actions">
      <button class="btn-open" onclick="window.open('${escHtml(card.url)}','_blank')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        開啟名片頁
      </button>
      <button class="btn-danger" onclick="confirmDelete('${id}')">刪除</button>
    </div>`;

  document.getElementById('detailOverlay').classList.add('active');
}

function addTag(){
  const input = document.getElementById('tagInput');
  const val = input.value.trim().replace(/,/g,'');
  if(!val) return;
  const card = getCards().find(c=>c.id===currentDetailId);
  if(!card||card.tags.includes(val)) { input.value=''; return; }
  updateCard(currentDetailId,{tags:[...card.tags,val]});
  input.value='';
  openDetail(currentDetailId);
  renderCards();
}

function removeTag(idx){
  const card = getCards().find(c=>c.id===currentDetailId);
  if(!card) return;
  const tags = card.tags.filter((_,i)=>i!==idx);
  updateCard(currentDetailId,{tags});
  openDetail(currentDetailId);
  renderCards();
}

function saveNote(){
  const val = document.getElementById('noteInput')?.value||'';
  if(currentDetailId) updateCard(currentDetailId,{note:val});
}

function confirmDelete(id){
  if(!confirm('確定要刪除這張名片？')) return;
  deleteCard(id);
  closeModal('detailOverlay');
  renderCards();
  updateCount();
  showToast('已刪除');
}

/* ── Modal helpers ── */
function openAddModal(){
  document.getElementById('addOverlay').classList.add('active');
  setTimeout(()=>document.getElementById('urlInput')?.focus(),300);
}
function closeModal(id){
  document.getElementById(id).classList.remove('active');
  if(id==='cameraOverlay') stopCamera();
  if(id==='detailOverlay'){ saveNote(); currentDetailId=null; renderCards(); updateCount(); }
}
function closeOnBg(e,id){
  if(e.target.id===id) closeModal(id);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    ['detailOverlay','addOverlay','cameraOverlay'].forEach(id=>{
      if(document.getElementById(id).classList.contains('active')) closeModal(id);
    });
  }
});

/* ── Toast ── */
let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const el = document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(()=>el.remove(),2200);
}

/* ── URL param: ?add= ── */
function checkAddParam(){
  const url = new URL(location.href);
  const addUrl = url.searchParams.get('add');
  if(!addUrl) return;
  history.replaceState({},'',location.pathname);
  document.getElementById('urlInput').value = addUrl;
  openAddModal();
  setTimeout(addByUrl,400);
}

/* ── Utils ── */
function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Init ── */
renderCards();
updateCount();
checkAddParam();
</script>
