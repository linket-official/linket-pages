<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>LINKet Case｜數位名片夾</title>
<meta name="description" content="收藏、管理你的數位名片">
<meta property="og:title" content="LINKet Case｜數位名片夾">
<meta property="og:description" content="掃描 QRcode 或貼入連結，收藏管理你的數位名片">
<meta property="og:url" content="https://linket.app/case">
<meta property="og:type" content="website">
<link rel="icon" href="/home/favicon.png">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#2979ff;
  --accent2:#1a56db;
  --bg:#0a0a0a;
  --bg2:#161616;
  --bg3:#222222;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.13);
  --text:#f2f2f2;
  --text2:rgba(242,242,242,.5);
  --text3:rgba(242,242,242,.28);
  --r:20px;
  --r-sm:10px;
  --topbar:56px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100svh;overflow-x:hidden;
  padding-bottom:calc(var(--safe-bot) + 80px);
}

/* ── Top Bar ── */
.topbar{
  position:sticky;top:0;z-index:100;
  height:calc(var(--topbar) + var(--safe-top));
  padding-top:var(--safe-top);
  background:rgba(10,10,10,.88);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding-left:1.1rem;padding-right:1.1rem;
}
.topbar-brand{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.125rem;font-weight:700;letter-spacing:-.02em;
  color:var(--text);text-decoration:none;
}
.topbar-brand .ket{color:var(--accent);}
.topbar-brand .case-label{font-weight:400;color:var(--text2);font-size:.9rem;}
.topbar-right{display:flex;align-items:center;gap:.6rem;}
.topbar-count{font-size:.75rem;color:var(--text3);letter-spacing:.04em;}
.topbar-add{
  width:34px;height:34px;border-radius:50%;
  background:var(--accent);border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .1s;flex-shrink:0;
}
.topbar-add:active{transform:scale(.92);}
.topbar-add svg{width:17px;height:17px;}

/* ── Search ── */
.search-wrap{
  padding:.7rem 1.1rem .3rem;
  position:sticky;top:var(--topbar);z-index:90;
  background:rgba(10,10,10,.85);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.search-box{
  display:flex;align-items:center;gap:.55rem;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;padding:.55rem .85rem;
  transition:border-color .15s;
}
.search-box:focus-within{border-color:rgba(41,121,255,.5);}
.search-box svg{width:15px;height:15px;flex-shrink:0;color:var(--text3);}
.search-input{
  background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Noto Sans TC',sans-serif;
  font-size:.9375rem;width:100%;
}
.search-input::placeholder{color:var(--text3);}

/* ── Case Tabs (分類) ── */
.case-tabs{
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  display:flex;gap:.45rem;padding:.65rem 1.1rem .5rem;
}
.case-tabs::-webkit-scrollbar{display:none;}
.case-tab{
  flex-shrink:0;display:flex;align-items:center;gap:.35rem;
  padding:.32rem .9rem;border-radius:50px;
  border:1px solid var(--border2);background:transparent;
  color:var(--text2);font-size:.8125rem;
  font-family:'Noto Sans TC',sans-serif;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.case-tab .tab-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--tab-color, var(--text3));flex-shrink:0;
}
.case-tab.active{
  background:var(--accent);border-color:var(--accent);color:#fff;
}
.case-tab.active .tab-dot{background:rgba(255,255,255,.7);}

/* ── Main ── */
.main{padding:.6rem 1.1rem 1rem;}

/* ── Wallet Stack ── */
.wallet-section{margin-bottom:2rem;}
.wallet-section-label{
  font-size:.75rem;color:var(--text3);
  letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:.85rem;padding-left:.1rem;
}

/* Apple Wallet 疊卡樣式 */
.wallet-stack{
  position:relative;
  /* 高度由卡片數量決定，JS動態設定 */
}
.wallet-card{
  position:absolute;left:0;right:0;
  border-radius:var(--r);overflow:hidden;
  cursor:pointer;
  transition:transform .32s cubic-bezier(.4,0,.2,1),
             box-shadow .32s ease;
  will-change:transform;
  transform-origin:top center;
}
.wallet-card.expanded-mode{
  position:relative;margin-bottom:.75rem;
  transform:none !important;
}

/* 卡片內容 */
.wcard-inner{
  width:100%;height:160px;
  position:relative;overflow:hidden;
  border-radius:var(--r);
}
/* OG image 作為卡片背景 */
.wcard-bg{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;
  transition:transform .3s ease;
}
.wcard-card:hover .wcard-bg{transform:scale(1.03);}
/* 無圖時的品牌色背景 */
.wcard-color-bg{
  position:absolute;inset:0;
  background:var(--wcard-bg, var(--bg3));
}
/* 漸層遮罩（讓文字可讀）*/
.wcard-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,.08) 0%,
    rgba(0,0,0,.55) 60%,
    rgba(0,0,0,.82) 100%
  );
}
/* 品牌識別（左上）*/
.wcard-brand{
  position:absolute;top:14px;left:16px;right:60px;
  display:flex;align-items:center;gap:.5rem;
}
.wcard-favicon{
  width:22px;height:22px;border-radius:5px;
  background:rgba(255,255,255,.15);flex-shrink:0;
  overflow:hidden;object-fit:cover;
}
.wcard-domain{
  font-size:.75rem;color:rgba(255,255,255,.7);
  font-family:'Space Grotesk',sans-serif;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
/* 標籤（右上）*/
.wcard-tags{
  position:absolute;top:12px;right:14px;
  display:flex;gap:.3rem;flex-wrap:wrap;justify-content:flex-end;
}
.wcard-tag{
  font-size:.6875rem;padding:.1rem .45rem;
  border-radius:50px;background:rgba(255,255,255,.15);
  color:rgba(255,255,255,.85);
  border:1px solid rgba(255,255,255,.2);white-space:nowrap;
  backdrop-filter:blur(4px);
}
/* 主要文字（下方）*/
.wcard-bottom{
  position:absolute;bottom:14px;left:16px;right:16px;
}
.wcard-title{
  font-size:1rem;font-weight:500;color:#fff;
  line-height:1.35;margin-bottom:.2rem;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
  text-shadow:0 1px 4px rgba(0,0,0,.4);
}
.wcard-desc{
  font-size:.75rem;color:rgba(255,255,255,.65);
  line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:1;
  -webkit-box-orient:vertical;overflow:hidden;
}
/* 展開鍵（右下）*/
.wcard-expand-btn{
  position:absolute;bottom:12px;right:14px;
  background:rgba(255,255,255,.15);border:none;
  border-radius:50%;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(255,255,255,.8);
  backdrop-filter:blur(4px);
  transition:background .15s;
}
.wcard-expand-btn:hover{background:rgba(255,255,255,.25);}
.wcard-expand-btn svg{width:13px;height:13px;}

/* 收起時的疊卡效果容器 */
.stack-wrapper{
  position:relative;cursor:pointer;
  margin-bottom:1.5rem;
}

/* ── Empty State ── */
.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:4rem 2rem;text-align:center;gap:1rem;
}
.empty-icon{
  width:60px;height:60px;border:1.5px solid var(--border2);
  border-radius:18px;display:flex;align-items:center;
  justify-content:center;color:var(--text3);margin-bottom:.5rem;
}
.empty-icon svg{width:26px;height:26px;}
.empty-title{font-size:1rem;font-weight:500;color:var(--text);}
.empty-sub{font-size:.875rem;color:var(--text2);line-height:1.6;max-width:240px;}
.empty-btn{
  margin-top:.5rem;padding:.68rem 1.6rem;border-radius:50px;
  background:var(--accent);border:none;color:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:.9375rem;
  cursor:pointer;transition:background .15s;
}
.empty-btn:active{background:var(--accent2);}

/* ── Modals ── */
.overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  align-items:flex-end;justify-content:center;
}
@media(min-width:600px){.overlay{align-items:center;}}
.overlay.active{display:flex;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.sheet{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:22px 22px 0 0;
  padding:1.4rem 1.25rem calc(1.8rem + var(--safe-bot));
  width:100%;max-width:500px;
  animation:slideUp .22s ease;
}
@media(min-width:600px){
  .sheet{border-radius:22px;margin:1rem;padding-bottom:1.8rem;}
}
@keyframes slideUp{from{transform:translateY(36px);opacity:0}to{transform:none;opacity:1}}

.sheet-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.0625rem;font-weight:600;margin-bottom:1.2rem;
}
.sheet-label{
  font-size:.8125rem;color:var(--text2);margin-bottom:.4rem;display:block;
}
.sheet-input{
  width:100%;background:var(--bg3);
  border:1px solid var(--border2);border-radius:var(--r-sm);
  padding:.68rem .9rem;color:var(--text);
  font-family:'Noto Sans TC',sans-serif;font-size:.9375rem;
  outline:none;transition:border-color .15s;margin-bottom:1rem;
}
.sheet-input:focus{border-color:rgba(41,121,255,.6);}
.sheet-btns{display:flex;gap:.6rem;}
.btn-primary{
  flex:1;padding:.7rem;border-radius:var(--r-sm);
  background:var(--accent);border:none;color:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:.9375rem;
  cursor:pointer;transition:background .15s;font-weight:500;
}
.btn-primary:active{background:var(--accent2);}
.btn-primary:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;}
.btn-ghost{
  padding:.7rem 1.2rem;border-radius:var(--r-sm);
  background:transparent;border:1px solid var(--border2);
  color:var(--text2);font-family:'Noto Sans TC',sans-serif;
  font-size:.9375rem;cursor:pointer;
}
.sheet-or{
  text-align:center;color:var(--text3);font-size:.8125rem;margin:.8rem 0;
  display:flex;align-items:center;gap:.75rem;
}
.sheet-or::before,.sheet-or::after{content:'';flex:1;height:1px;background:var(--border);}
.scan-btn{
  width:100%;padding:.7rem;border-radius:var(--r-sm);
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);font-family:'Noto Sans TC',sans-serif;
  font-size:.9375rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
}
.scan-btn svg{width:17px;height:17px;flex-shrink:0;}

/* Camera sheet */
.camera-sheet{
  background:#000;
  border-radius:22px 22px 0 0;
  padding:0;width:100%;max-width:500px;
  overflow:hidden;animation:slideUp .22s ease;
}
@media(min-width:600px){.camera-sheet{border-radius:22px;margin:1rem;}}
#camera-video{
  width:100%;display:block;background:#000;
  max-height:60svh;object-fit:cover;
}
.camera-footer{
  background:#111;padding:1rem 1.25rem calc(1.4rem + var(--safe-bot));
  display:flex;flex-direction:column;align-items:center;gap:.75rem;
}
.camera-hint{font-size:.875rem;color:rgba(255,255,255,.5);}
.camera-cancel{
  padding:.6rem 2rem;border-radius:50px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.7);font-family:'Noto Sans TC',sans-serif;
  font-size:.875rem;cursor:pointer;
}
#scan-canvas{display:none;}

/* Detail sheet */
.detail-sheet{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:22px 22px 0 0;
  width:100%;max-width:500px;
  animation:slideUp .22s ease;
  max-height:92svh;overflow-y:auto;
  padding:1.25rem 1.25rem calc(1.8rem + var(--safe-bot));
}
@media(min-width:600px){.detail-sheet{border-radius:22px;margin:1rem;padding-bottom:1.8rem;}}
.detail-card-preview{
  width:100%;height:160px;border-radius:14px;
  overflow:hidden;position:relative;margin-bottom:1rem;
  background:var(--bg3);
}
.detail-card-preview img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.detail-card-preview .wcard-overlay{border-radius:14px;}
.detail-title{font-size:1rem;font-weight:500;margin-bottom:.35rem;line-height:1.4;}
.detail-desc{font-size:.875rem;color:var(--text2);line-height:1.6;margin-bottom:.7rem;}
.detail-url{
  font-size:.8125rem;color:var(--accent);word-break:break-all;
  text-decoration:none;display:block;margin-bottom:1rem;
}
.detail-url:active{opacity:.7;}
.dlabel{
  font-size:.7rem;color:var(--text3);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:.45rem;margin-top:.8rem;
}
.tag-wrap{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.25rem;}
.tag-chip{
  display:flex;align-items:center;gap:.25rem;
  padding:.18rem .55rem .18rem .6rem;border-radius:50px;
  background:rgba(41,121,255,.15);border:1px solid rgba(41,121,255,.2);
  font-size:.75rem;color:rgba(100,160,255,.9);
}
.tag-chip-del{
  background:transparent;border:none;cursor:pointer;
  color:rgba(100,160,255,.55);font-size:.9rem;padding:0;line-height:1;
}
.tag-add-inp{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:50px;padding:.2rem .7rem;
  color:var(--text);font-family:'Noto Sans TC',sans-serif;
  font-size:.8125rem;outline:none;width:90px;
  transition:border-color .15s;
}
.tag-add-inp:focus{border-color:rgba(41,121,255,.5);}
.note-inp{
  width:100%;background:var(--bg3);
  border:1px solid var(--border2);border-radius:var(--r-sm);
  padding:.65rem .85rem;color:var(--text);
  font-family:'Noto Sans TC',sans-serif;font-size:.875rem;
  outline:none;resize:none;min-height:72px;
  transition:border-color .15s;line-height:1.6;
}
.note-inp:focus{border-color:rgba(41,121,255,.5);}
.detail-actions{display:flex;gap:.6rem;margin-top:1.2rem;}
.btn-open{
  flex:1;padding:.68rem;border-radius:var(--r-sm);
  background:var(--accent);border:none;color:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:.875rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.4rem;
}
.btn-open svg{width:14px;height:14px;}
.btn-danger{
  padding:.68rem 1rem;border-radius:var(--r-sm);
  background:transparent;border:1px solid rgba(220,53,69,.3);
  color:rgba(220,53,69,.7);font-family:'Noto Sans TC',sans-serif;
  font-size:.875rem;cursor:pointer;
}

/* Toast */
.toast{
  position:fixed;
  bottom:calc(1.25rem + var(--safe-bot));
  left:50%;transform:translateX(-50%);
  background:rgba(40,40,40,.95);
  border:1px solid var(--border2);
  border-radius:50px;padding:.5rem 1.2rem;
  font-size:.875rem;color:var(--text);
  white-space:nowrap;z-index:500;
  animation:toastIn .18s ease;pointer-events:none;
  box-shadow:0 6px 24px rgba(0,0,0,.5);
  backdrop-filter:blur(8px);
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Skeleton */
.skeleton-card{
  width:100%;height:160px;border-radius:var(--r);
  background:var(--bg3);margin-bottom:.75rem;overflow:hidden;
}
.skeleton-shimmer{
  width:100%;height:100%;
  background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<header class="topbar">
  <a class="topbar-brand" href="/home">
    <span>LIN<span class="ket">Ket</span></span>
    <span class="case-label">&nbsp;Case</span>
  </a>
  <div class="topbar-right">
    <span class="topbar-count" id="cardCount"></span>
    <button class="topbar-add" onclick="openAddSheet()" aria-label="新增名片">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" type="text"
      placeholder="搜尋名稱、標籤、備註..." oninput="render()">
  </div>
</div>
<div class="case-tabs" id="caseTabs"></div>

<main class="main" id="main"></main>

<!-- 新增 Sheet -->
<div class="overlay" id="addOverlay" onclick="closeOnBg(event,'addOverlay')">
  <div class="sheet">
    <div class="sheet-title">新增名片</div>
    <label class="sheet-label">貼入網址</label>
    <input class="sheet-input" id="urlInput" type="url"
      placeholder="https://linket.app/..."
      onkeydown="if(event.key==='Enter')addByUrl()">
    <div class="sheet-btns">
      <button class="btn-ghost" onclick="closeSheet('addOverlay')">取消</button>
      <button class="btn-primary" id="addBtn" onclick="addByUrl()">加入名片夾</button>
    </div>
    <div class="sheet-or">或</div>
    <button class="scan-btn" onclick="openCamera()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="15" y="2" width="7" height="7" rx="1.5"/>
        <rect x="2" y="15" width="7" height="7" rx="1.5"/>
        <line x1="15" y1="15" x2="22" y2="15"/><line x1="22" y1="15" x2="22" y2="22"/>
        <line x1="15" y1="22" x2="22" y2="22"/><line x1="15" y1="15" x2="15" y2="22"/>
      </svg>
      掃描 QRcode
    </button>
  </div>
</div>

<!-- 相機 Sheet（無背景點擊關閉）-->
<div class="overlay" id="cameraOverlay">
  <div class="camera-sheet">
    <video id="camVideo" playsinline webkit-playsinline muted autoplay></video>
    <canvas id="scanCanvas" style="display:none"></canvas>
    <div class="camera-footer">
      <div class="camera-hint" id="camHint">將 QRcode 對準鏡頭</div>
      <button class="camera-cancel" onclick="stopCamera()">取消</button>
    </div>
  </div>
</div>

<!-- 詳情 Sheet -->
<div class="overlay" id="detailOverlay" onclick="closeOnBg(event,'detailOverlay')">
  <div class="detail-sheet" id="detailSheet"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
/* ────────────────────────
   State
──────────────────────── */
const STORE = 'linket_case_v1';
let activeTag = '全部';
let camStream = null;
let rafId = null;
let currentId = null;
let isExpanded = false; // wallet 展開狀態

/* ────────────────────────
   Storage
──────────────────────── */
const load = ()=>{ try{ return JSON.parse(localStorage.getItem(STORE)||'[]'); } catch(e){ return []; } };
const save = c => localStorage.setItem(STORE, JSON.stringify(c));

const addCard = c => {
  const cards = load();
  if(cards.find(x=>x.url===c.url)) return false;
  cards.unshift(c); save(cards); return true;
};
const delCard = id => save(load().filter(c=>c.id!==id));
const updCard = (id,u) => save(load().map(c=>c.id===id?{...c,...u}:c));

/* ────────────────────────
   Fetch OG
──────────────────────── */
async function fetchOG(rawUrl){
  let url = rawUrl.trim();
  if(!/^https?:\/\//i.test(url)) url='https://'+url;

  const proxies=[
    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
  ];
  let html='';
  for(const p of proxies){
    try{
      const r = await fetch(p,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const ct = r.headers.get('content-type')||'';
      html = ct.includes('json') ? (await r.json()).contents||'' : await r.text();
      if(html.length>100) break;
    } catch(e){ continue; }
  }

  let title=url, desc='', image='', favicon='';
  if(html){
    const doc = new DOMParser().parseFromString(html,'text/html');
    const og = k=>{const el=doc.querySelector(`meta[property="${k}"],meta[name="${k}"]`);return el?el.getAttribute('content'):''};
    title = og('og:title')||doc.title||url;
    desc  = og('og:description')||og('description')||'';
    image = og('og:image')||'';
    if(image && !/^https?:/.test(image)){
      try{ const b=new URL(url); image=b.origin+(image.startsWith('/')?image:'/'+image); } catch(e){ image=''; }
    }
    // favicon
    const fl=doc.querySelector('link[rel*="icon"]');
    if(fl){ try{ const b=new URL(url); favicon=new URL(fl.getAttribute('href'),b.origin).href; } catch(e){} }
    if(!favicon) try{ favicon=new URL(url).origin+'/favicon.ico'; } catch(e){}
  }

  return {
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    url, title, desc, image, favicon,
    addedAt: new Date().toISOString(),
    tags:[], note:''
  };
}

/* ────────────────────────
   Brand color from domain
──────────────────────── */
const DOMAIN_COLORS = {
  'linket.app':'#2979ff','linket.net':'#2979ff',
  'instagram.com':'#e1306c','facebook.com':'#1877f2',
  'youtube.com':'#ff0000','threads.net':'#000',
  'line.me':'#06c755','tiktok.com':'#010101',
  'twitter.com':'#1da1f2','x.com':'#000',
};
function brandColor(url){
  try{
    const host = new URL(url).hostname.replace('www.','');
    for(const [k,v] of Object.entries(DOMAIN_COLORS)) if(host.includes(k)) return v;
  } catch(e){}
  // 從 URL hash 生成顏色
  let h=0; for(const c of url) h=(h*31+c.charCodeAt(0))&0xffffffff;
  const hue = Math.abs(h)%360;
  return `hsl(${hue},40%,22%)`;
}

/* ────────────────────────
   Render
──────────────────────── */
function filtered(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  let cards = load();
  if(activeTag!=='全部') cards=cards.filter(c=>c.tags.includes(activeTag));
  if(q) cards=cards.filter(c=>
    [c.title,c.desc,...c.tags,c.note,c.url].some(s=>(s||'').toLowerCase().includes(q))
  );
  return cards;
}

function allTags(){ return[...new Set(load().flatMap(c=>c.tags))].sort(); }

function renderTabs(){
  const tags=['全部',...allTags()];
  document.getElementById('caseTabs').innerHTML = tags.map(t=>`
    <button class="case-tab${t===activeTag?' active':''}" onclick="setTag('${esc(t)}')" style="--tab-color:${t==='全部'?'var(--accent)':'#aaa'}">
      <span class="tab-dot"></span>${esc(t)}
    </button>`).join('');
}

function setTag(t){ activeTag=t; renderTabs(); render(); }

function render(){
  const cards = filtered();
  const main = document.getElementById('main');
  renderTabs();
  updateCount();

  if(!cards.length){
    const all=load();
    main.innerHTML=`<div class="empty">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>
      <div class="empty-title">${all.length?'找不到結果':'名片夾是空的'}</div>
      <div class="empty-sub">${all.length?'試試其他關鍵字':'掃描 QRcode 或貼入連結，開始收藏'}</div>
      ${!all.length?`<button class="empty-btn" onclick="openAddSheet()">+ 新增第一張名片</button>`:''}
    </div>`;
    return;
  }

  // Apple Wallet 風格：疊卡顯示，點擊展開
  const STACK_OFFSET = 44; // 每張卡片露出的高度
  const CARD_H = 160;

  if(isExpanded){
    // 展開：所有卡片正常排列
    main.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;">
        <div style="font-size:.75rem;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;">
          ${cards.length} 張名片
        </div>
        <button onclick="collapseWallet()" style="background:transparent;border:none;color:var(--text2);font-size:.8125rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;">
          收起
        </button>
      </div>
      ${cards.map(c=>cardHTML(c,true)).join('')}`;
  } else {
    // 收疊：Apple Wallet 疊卡
    const totalH = CARD_H + (cards.length-1)*STACK_OFFSET;
    const cardsHTML = cards.map((c,i)=>{
      const bg = brandColor(c.url);
      const zIndex = cards.length-i;
      const translateY = i===0 ? 0 : `${i*STACK_OFFSET}px`;
      const scale = 1 - i*0.015;
      return `<div class="wallet-card" id="wc-${c.id}"
        style="z-index:${zIndex};transform:translateY(${translateY}) scale(${scale});top:0;"
        onclick="${i===0?`openDetail('${c.id}')`:`expandWallet()`}">
        ${cardInner(c)}
      </div>`;
    }).join('');

    main.innerHTML=`
      <div class="stack-wrapper" style="height:${totalH}px;" onclick="expandWallet()">
        ${cardsHTML}
      </div>
      <div style="text-align:center;margin-top:.5rem;">
        <button onclick="expandWallet()" style="background:transparent;border:none;color:var(--text3);font-size:.8125rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;padding:.25rem .75rem;">
          查看全部 ${cards.length} 張 ↓
        </button>
      </div>`;
  }
}

function expandWallet(){ isExpanded=true; render(); }
function collapseWallet(){ isExpanded=false; render(); }

function cardInner(c){
  const bg = brandColor(c.url);
  const imgPart = c.image
    ? `<img class="wcard-bg" src="${esc(c.image)}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : '';
  const faviconPart = c.favicon
    ? `<img class="wcard-favicon" src="${esc(c.favicon)}" alt="" onerror="this.style.display='none'">`
    : `<div class="wcard-favicon"></div>`;
  let domain='';
  try{ domain=new URL(c.url).hostname.replace('www.',''); } catch(e){}
  const tags = c.tags.slice(0,2).map(t=>`<span class="wcard-tag">${esc(t)}</span>`).join('');
  return `<div class="wcard-inner">
    <div class="wcard-color-bg" style="--wcard-bg:${bg}"></div>
    ${imgPart}
    <div class="wcard-overlay"></div>
    <div class="wcard-brand">${faviconPart}<span class="wcard-domain">${esc(domain)}</span></div>
    ${tags?`<div class="wcard-tags">${tags}</div>`:''}
    <div class="wcard-bottom">
      <div class="wcard-title">${esc(c.title)}</div>
      ${c.desc?`<div class="wcard-desc">${esc(c.desc)}</div>`:''}
    </div>
  </div>`;
}

function cardHTML(c,expanded=false){
  return `<div style="margin-bottom:.75rem;border-radius:var(--r);overflow:hidden;cursor:pointer;"
    onclick="openDetail('${c.id}')">
    ${cardInner(c)}
  </div>`;
}

function updateCount(){
  const n=load().length;
  document.getElementById('cardCount').textContent=n?n+'張':'';
}

/* ────────────────────────
   Add
──────────────────────── */
function openAddSheet(){
  document.getElementById('addOverlay').classList.add('active');
  setTimeout(()=>document.getElementById('urlInput')?.focus(),300);
}

async function addByUrl(){
  const input=document.getElementById('urlInput');
  const btn=document.getElementById('addBtn');
  let url=input.value.trim();
  if(!url){ showToast('請輸入連結'); return; }
  if(!/^https?:\/\//i.test(url)) url='https://'+url;
  if(load().find(c=>c.url===url)){ showToast('此名片已存在'); return; }

  btn.disabled=true; btn.textContent='擷取中...';
  try{
    const card=await fetchOG(url);
    if(addCard(card)){
      closeSheet('addOverlay'); input.value='';
      isExpanded=false; render(); showToast('已加入名片夾');
    } else showToast('此名片已存在');
  } catch(e){
    // fallback
    const fb={id:Date.now().toString(36),url,title:url,desc:'',image:'',favicon:'',addedAt:new Date().toISOString(),tags:[],note:''};
    if(addCard(fb)){
      closeSheet('addOverlay'); input.value='';
      isExpanded=false; render(); showToast('已加入（無法擷取資訊）');
    }
  } finally{ btn.disabled=false; btn.textContent='加入名片夾'; }
}

/* ────────────────────────
   Camera — 修正版
──────────────────────── */
async function openCamera(){
  closeSheet('addOverlay');

  // 先取得權限再顯示 modal（避免系統對話框誤觸 overlay）
  let stream;
  try{
    // 優先後鏡頭，失敗改任意鏡頭
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{exact:'environment'} }
      });
    } catch(e){
      stream = await navigator.mediaDevices.getUserMedia({ video:true });
    }
  } catch(e){
    showToast('請允許相機存取後再試');
    return;
  }

  camStream=stream;
  document.getElementById('cameraOverlay').classList.add('active');

  const video=document.getElementById('camVideo');
  video.srcObject=stream;

  // iOS 需要手動呼叫 play()
  try{ await video.play(); } catch(e){}

  // 等有畫面再開始掃
  await new Promise(res=>{
    const check=()=>{ if(video.videoWidth>0) res(); else requestAnimationFrame(check); };
    requestAnimationFrame(check);
    setTimeout(res,4000); // 最長等4秒
  });

  startScan();
}

function startScan(){
  if(typeof jsQR==='undefined'){
    stopCamera(); showToast('掃描模組載入失敗，請改用貼入連結'); return;
  }
  const video=document.getElementById('camVideo');
  const canvas=document.getElementById('scanCanvas');
  const ctx=canvas.getContext('2d');
  let last=0;

  const tick=now=>{
    rafId=requestAnimationFrame(tick);
    if(now-last<250) return;
    last=now;
    if(!video.videoWidth) return;
    canvas.width=video.videoWidth; canvas.height=video.videoHeight;
    try{ ctx.drawImage(video,0,0); } catch(e){ return; }
    let px;
    try{ px=ctx.getImageData(0,0,canvas.width,canvas.height); } catch(e){ return; }
    const code=jsQR(px.data,px.width,px.height,{inversionAttempts:'dontInvert'});
    if(code?.data){ cancelAnimationFrame(rafId); stopCamera(); handleScan(code.data); }
  };
  rafId=requestAnimationFrame(tick);
}

function stopCamera(){
  cancelAnimationFrame(rafId); rafId=null;
  camStream?.getTracks().forEach(t=>t.stop()); camStream=null;
  document.getElementById('cameraOverlay').classList.remove('active');
}

async function handleScan(url){
  showToast('掃描成功，擷取中...');
  try{
    const card=await fetchOG(url);
    if(addCard(card)){ isExpanded=false; render(); showToast('已加入名片夾'); }
    else showToast('此名片已存在');
  } catch(e){
    const fb={id:Date.now().toString(36),url,title:url,desc:'',image:'',favicon:'',addedAt:new Date().toISOString(),tags:[],note:''};
    if(addCard(fb)){ isExpanded=false; render(); showToast('已加入（無法擷取資訊）'); }
  }
}

/* ────────────────────────
   Detail
──────────────────────── */
function openDetail(id){
  const c=load().find(x=>x.id===id);
  if(!c) return;
  currentId=id;
  const bg=brandColor(c.url);
  const imgPart=c.image?`<img src="${esc(c.image)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:'' ;
  const tagsHtml=[
    ...c.tags.map((t,i)=>`<span class="tag-chip">${esc(t)}<button class="tag-chip-del" onclick="rmTag(${i})">×</button></span>`),
    `<input class="tag-add-inp" id="tagInp" placeholder="+ 標籤" maxlength="12"
      onkeydown="if(event.key==='Enter'||event.key===','){event.preventDefault();addTag()}">`
  ].join('');
  let domain='';try{domain=new URL(c.url).hostname.replace('www.','');}catch(e){}
  const dateStr=new Date(c.addedAt).toLocaleDateString('zh-TW',{year:'numeric',month:'short',day:'numeric'});

  document.getElementById('detailSheet').innerHTML=`
    <div class="detail-card-preview" style="background:${bg}">
      ${imgPart}<div class="wcard-overlay"></div>
    </div>
    <div class="detail-title">${esc(c.title)}</div>
    ${c.desc?`<div class="detail-desc">${esc(c.desc)}</div>`:''}
    <a class="detail-url" href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.url)}</a>
    <div style="font-size:.75rem;color:var(--text3);margin-bottom:.85rem;">${esc(domain)}　·　${dateStr}</div>
    <div class="dlabel">標籤</div>
    <div class="tag-wrap" id="tagWrap">${tagsHtml}</div>
    <div class="dlabel">備註</div>
    <textarea class="note-inp" id="noteInp" placeholder="認識場合、備忘事項...">${esc(c.note||'')}</textarea>
    <div class="detail-actions">
      <button class="btn-open" onclick="window.open('${esc(c.url)}','_blank')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>開啟名片頁
      </button>
      <button class="btn-danger" onclick="doDelete('${id}')">刪除</button>
    </div>`;
  document.getElementById('detailOverlay').classList.add('active');
}

function addTag(){
  const inp=document.getElementById('tagInp');
  const val=inp.value.trim().replace(/,/g,'');
  if(!val) return;
  const c=load().find(x=>x.id===currentId);
  if(!c||c.tags.includes(val)){inp.value='';return;}
  updCard(currentId,{tags:[...c.tags,val]});
  inp.value=''; openDetail(currentId); render();
}

function rmTag(i){
  const c=load().find(x=>x.id===currentId);
  if(!c) return;
  updCard(currentId,{tags:c.tags.filter((_,j)=>j!==i)});
  openDetail(currentId); render();
}

function saveNote(){
  const val=document.getElementById('noteInp')?.value||'';
  if(currentId) updCard(currentId,{note:val});
}

function doDelete(id){
  if(!confirm('確定刪除？')) return;
  delCard(id); closeSheet('detailOverlay');
  render(); showToast('已刪除');
}

/* ────────────────────────
   Sheet helpers
──────────────────────── */
function closeSheet(id){
  document.getElementById(id).classList.remove('active');
  if(id==='cameraOverlay') stopCamera();
  if(id==='detailOverlay'){ saveNote(); currentId=null; render(); }
}
function closeOnBg(e,id){ if(e.target.id===id) closeSheet(id); }
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')['detailOverlay','addOverlay','cameraOverlay'].forEach(id=>{
    if(document.getElementById(id).classList.contains('active')) closeSheet(id);
  });
});

/* ────────────────────────
   Toast
──────────────────────── */
let toastT;
function showToast(msg){
  clearTimeout(toastT);
  document.querySelector('.toast')?.remove();
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  toastT=setTimeout(()=>el.remove(),2400);
}

/* ────────────────────────
   ?add= param
──────────────────────── */
function checkParam(){
  const u=new URL(location.href);
  const a=u.searchParams.get('add');
  if(!a) return;
  history.replaceState({},'',location.pathname);
  document.getElementById('urlInput').value=a;
  openAddSheet();
  setTimeout(addByUrl,500);
}

/* ────────────────────────
   Utils
──────────────────────── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

/* ── Init ── */
render();
checkParam();
</script>
